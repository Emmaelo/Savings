spring:
  application:
    name: savings-project
  threads:
    virtual:
      enabled: true
  config:
    import: optional:/Users/EmmanuelEzeuchegbu/Desktop/savings-project/.env[.properties]
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
    # driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: savings-group
      auto-offset-reset: earliest
    producer:
      bootstrap-servers: localhost:9092
    listener:
      type: single

  mail:
    host: smtp.mail.yahoo.com
    port: 465
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            socketFactory:
              class: javax.net.ssl.SSLSocketFactory

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.emmanuelandsamuel: TRACE

email:
  username: ${EMAIL_USERNAME}

outbox:
  poll:
    pending-interval-ms: 5000
    retry-interval-ms: 60000
    cleanup-interval-ms: 3600000
    batch-size: 50
    backoff-multiplier-seconds: 30
    cleanup-retention-hours: 24